<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Deploy Admin</title>
<script>
;(function () {
    var src = '//cdn.jsdelivr.net/npm/eruda';
    if (!/eruda=true/.test(window.location) && localStorage.getItem('active-eruda') != 'true') return;
    document.write('<scr' + 'ipt src="' + src + '"></scr' + 'ipt>');
    document.write('<scr' + 'ipt>eruda.init();</scr' + 'ipt>');
})();
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Setup (shown on first launch) -->
<div id="setup-page" class="page">
  <div class="page-title">Setup</div>
  <div class="form-group">
    <label class="form-label">Server URL</label>
    <input class="form-input" id="cfg-url" placeholder="https://your-server.up.railway.app">
  </div>
  <div class="form-group">
    <label class="form-label">Admin API Key</label>
    <input class="form-input" id="cfg-key" type="password" placeholder="your-admin-api-key">
  </div>
  <button class="btn" id="setup-connect-btn">Connect</button>
</div>

<!-- Settings page (menu) -->
<div id="settings-page" class="page">
  <div class="page-title">Settings</div>
  <div class="settings-menu">
    <div class="settings-row" id="settings-connection-row">
      <div class="settings-row-icon-wrap" style="background:#3390ec">
        <svg class="settings-row-icon" viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.49.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1115.5 12 3.5 3.5 0 0112 15.5z"/></svg>
      </div>
      <span class="settings-row-label">Connection</span>
      <span class="settings-row-hint" id="settings-connection-hint"></span>
      <svg class="settings-row-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="settings-row" id="settings-agents-row">
      <div class="settings-row-icon-wrap" style="background:#29b36a">
        <svg class="settings-row-icon" viewBox="0 0 24 24"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
      </div>
      <span class="settings-row-label">Agents</span>
      <span class="settings-row-hint" id="settings-agents-hint"></span>
      <svg class="settings-row-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="settings-row" id="settings-profiles-row">
      <div class="settings-row-icon-wrap" style="background:#f5a623">
        <svg class="settings-row-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
      </div>
      <span class="settings-row-label">Profiles</span>
      <span class="settings-row-hint" id="settings-profiles-hint"></span>
      <svg class="settings-row-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
</div>

<!-- Connection page -->
<div id="connection-page" class="page">
  <button class="btn-back" id="connection-back-btn">← Settings</button>
  <div class="page-title">Connection</div>
  <div class="form-group">
    <label class="form-label">Server URL</label>
    <input class="form-input" id="settings-url" placeholder="https://your-server.up.railway.app">
  </div>
  <div class="form-group">
    <label class="form-label">Admin API Key</label>
    <input class="form-input" id="settings-key" type="password" placeholder="your-admin-api-key">
  </div>
  <button class="btn" id="settings-save-btn">Save</button>
</div>

<!-- Jobs page -->
<div id="jobs-page" class="page">
  <div class="page-title">Jobs</div>
  <div id="jobs-list"></div>
</div>

<!-- Agents page -->
<div id="agents-page" class="page">
  <button class="btn-back" id="agents-back-btn">← Settings</button>
  <div class="page-title">Agents</div>
  <div id="agents-list"></div>
</div>

<!-- Profiles page -->
<div id="profiles-page" class="page">
  <div id="profiles-list">
    <button class="btn-back" id="profiles-settings-back-btn">← Settings</button>
    <div class="page-title">Profiles</div>
    <div id="profiles-list-items"></div>
    <button class="btn-add-row" id="add-profile-btn">Add Profile</button>
  </div>
  <div id="profiles-form" style="display:none">
    <button class="btn-back" id="profile-back-btn">← Profiles</button>
    <div class="page-title" id="profile-form-title">New Profile</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="profile-name" placeholder="e.g. production, preview">
    </div>
    <div class="form-group">
      <label class="form-label">Working Directory</label>
      <input class="form-input" id="profile-workdir" placeholder="e.g. /home/agent/myproject">
    </div>
    <div class="form-section-title">Environment Variables</div>
    <div id="envvar-rows"></div>
    <div class="error-msg" id="envvar-error" style="display:none"></div>
    <button class="btn-add-row" id="add-envvar-btn">Add Variable</button>
    <div class="form-section-title">Steps</div>
    <textarea class="form-input steps-textarea" id="steps-textarea" rows="6"
      placeholder="- npm install&#10;- git pull&#10;- eas build --local"></textarea>
    <div class="profile-form-actions">
      <button class="btn" id="profile-save-btn">Create Profile</button>
      <button class="btn btn-cancel" id="profile-delete-btn" style="display:none">Delete Profile</button>
    </div>
    <div class="error-msg" id="profile-error" style="display:none"></div>
  </div>
</div>

<!-- New Job page -->
<div id="new-page" class="page">
  <button class="btn-back" id="new-job-back-btn">← Jobs</button>
  <div class="page-title">New Job</div>
  <div class="form-group">
    <label class="form-label">Build Profile</label>
    <select class="form-select" id="job-profile-select" disabled>
      <option value="">Loading...</option>
    </select>
    <div id="new-job-profile-hint"></div>
  </div>
  <div id="env-overrides-section" style="display:none">
    <div class="env-overrides-toggle" id="env-overrides-toggle">
      <span>Environment Overrides</span>
      <span class="env-overrides-chevron" id="env-overrides-chevron">&#9654;</span>
    </div>
    <div id="env-overrides-body" style="display:none">
      <div id="env-override-rows"></div>
      <div class="error-msg" id="env-override-error" style="display:none"></div>
      <button class="btn-add-row" id="add-env-override-btn">Add Variable</button>
    </div>
  </div>
  <div class="error-msg" id="new-job-error" style="display:none"></div>
  <button class="btn" id="submit-btn" disabled>Create Job</button>
</div>

<!-- Settings icon top-right -->
<button class="settings-btn hidden" id="settings-btn">
  <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.49.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1115.5 12 3.5 3.5 0 0112 15.5z"/></svg>
</button>

<!-- FAB gradient overlay (fade behind button) -->
<div class="fab-gradient hidden" id="fab-gradient"></div>

<!-- FAB -->
<button class="fab hidden" id="fab-new">
  <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  New Job
</button>

<!-- Card templates -->
<template id="tpl-job-card">
  <div class="card">
    <div class="card-header">
      <span class="card-profile"></span>
      <span class="badge"></span>
    </div>
    <div class="card-meta"></div>
    <div class="card-details" id="">
      <div class="loading"><span class="spinner"></span></div>
    </div>
  </div>
</template>

<template id="tpl-agent-card">
  <div class="card">
    <div class="card-header">
      <span>
        <span class="agent-dot"></span>
        <span class="agent-name"></span>
      </span>
      <span class="badge"></span>
    </div>
    <div class="card-meta"></div>
    <div class="card-details">
      <div class="loading"><span class="spinner"></span></div>
    </div>
  </div>
</template>

<script type="module" src="js/app.js"></script>
</body>
</html>
